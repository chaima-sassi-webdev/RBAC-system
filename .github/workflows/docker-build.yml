name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:

  docker:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4


    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}


    - name: Build backend
      run: |
        docker build -t chaimahs/rbac-backend:latest ./backend


    - name: Push backend
      run: |
        docker push chaimahs/rbac-backend:latest


    - name: Build frontend
      run: |
        docker build -t chaimahs/rbac-frontend:latest ./frontend


    - name: Push frontend
      run: |
        docker push chaimahs/rbac-frontend:latest
