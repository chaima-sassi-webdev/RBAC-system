services:

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: chaima
      MONGO_INITDB_ROOT_PASSWORD: chaima123
    volumes:
      - mongodb_data:/data/db
    networks:
      - erp-network


  backend:
    image: chaima-devops/rbac-backend:latest
    container_name: erp-backend-container
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      DATABASE_URL: mongodb://chaima:chaima123@mongodb:27017/erp?authSource=admin
    networks:
      - erp-network


  frontend:
    image: chaima-devops/rbac-frontend:latest
    container_name: erp-frontend-container
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - erp-network


volumes:
  mongodb_data:


networks:
  erp-network:
